<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modelos</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-box">

<img id="bannerCategoria" class="banner-categoria">

<p>Clique no cartão desejado para editar.</p>

<div id="listaModelos"></div>

<button onclick="voltar()">Voltar</button>

</div>

<!-- MODAL -->
<div id="modalConfirm" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;">
  <div style="background:#fff;padding:20px;border-radius:12px;text-align:center;width:250px;">
    <p>Deseja editar este cartão?</p>
    <button onclick="irEditor()">SIM</button>
    <button onclick="fecharModal()">NÃO</button>
  </div>
</div>

<script>

if (localStorage.getItem("logado") !== "true") {
  window.location.href = "index.html";
}

const categoria = localStorage.getItem("categoria");

const banners = {
  "infantil-masc": "logo.infantil_masc.png",
  "infantil-femi": "logo.infantil_femi.png",
  "adulto-masc": "adulto_masc.png",
  "adulto-femi": "adulto_feminino.png",
  "times": "times.png",
  "cristao": "logo.cristao.png"
};

document.getElementById("bannerCategoria").src =
  "banners/" + banners[categoria];

let modelosSelecionados = JSON.parse(localStorage.getItem("modelosSelecionados")) || [];

fetch("modelos.json")
  .then(res => res.json())
  .then(data => {

    const lista = document.getElementById("listaModelos");

    const modelos = data[categoria] || [];

    modelos.forEach(img => {

      const el = document.createElement("img");

      el.src = `modelos/${img}`;
      el.width = 400;
      el.style.cursor = "pointer";
      el.style.borderRadius = "10px";
      el.style.margin = "5px";

      el.onclick = () => selecionarModelo(img);

      lista.appendChild(el);
    });

  })
  .catch(err => {
    console.error("Erro ao carregar modelos.json:", err);
  });

function selecionarModelo(modelo) {

  modelosSelecionados.push(modelo);

  localStorage.setItem("modelosSelecionados", JSON.stringify(modelosSelecionados));
  localStorage.setItem("modeloSelecionado", modelo);

  document.getElementById("modalConfirm").style.display = "flex";
}

function irEditor() {
  window.location.href = "editor.html";
}

function fecharModal() {
  document.getElementById("modalConfirm").style.display = "none";
}

function voltar() {
  window.location.href = "painel.html";
}

</script>

</body>
</html>
