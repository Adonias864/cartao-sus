<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modelos</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="login-box">

<h1 id="tituloCategoria"></h1>

<p>
Clique no cartão desejado para editar as informações.
</p>

<div id="areaModelos"></div>

<button onclick="voltar()">
Voltar
</button>

</div>

<script>

if(localStorage.getItem("logado") !== "true"){

  window.location.href = "index.html";

}

const categoria =
  localStorage.getItem("categoria");

const areaModelos =
  document.getElementById("areaModelos");

document.getElementById("tituloCategoria")
.innerText =
categoria.toUpperCase();

if(categoria === "times"){

  areaModelos.innerHTML = `

    <img
      src="modelos/Cartao-SUS-Playstaion.png"
      width="300"
      onclick="confirmarEdicao()"
      style="cursor:pointer;border-radius:10px;transition:0.3s;">

  `;

}

function confirmarEdicao(){

  const ok = confirm("Deseja editar este cartão?");

  if(ok){
    window.location.href = "editor.html";
  }

}

function voltar(){

  window.location.href = "painel.html";

}

</script>

</body>
</html>
