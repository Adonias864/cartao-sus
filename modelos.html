<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modelos</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="login-box">

<h1 id="tituloCategoria"></h1>

<p>
Clique no cartão desejado para editar as informações.
</p>

<div id="areaModelos"></div>

<button onclick="voltar()">
Voltar
</button>

</div>

<script>

let modelosSelecionados = JSON.parse(localStorage.getItem("modelosSelecionados")) || [];
  
if(localStorage.getItem("logado") !== "true"){
  window.location.href = "index.html";
}

const categoria =
  localStorage.getItem("categoria");

const areaModelos =
  document.getElementById("areaModelos");

document.getElementById("tituloCategoria")
.innerText =
categoria.toUpperCase();

if(categoria === "times"){

  areaModelos.innerHTML = `

    <img
      src="modelos/Cartao-SUS-Playstaion.png"
      width="300"
      onclick="selecionarModelo('Cartao-SUS-Playstaion.png')"
      style="cursor:pointer;border-radius:10px;transition:0.3s;">

    <img
      src="modelos/modelo1.png"
      width="300"
      onclick="selecionarModelo('modelo1.png')"
      style="cursor:pointer;border-radius:10px;transition:0.3s;">
      
  `;

}

function voltar(){

  window.location.href = "painel.html";

}

function irEditor(){

  window.location.href = "editor.html";

}

function fecharModal(){

  document.getElementById("modalConfirm").style.display = "none";

}
  
function selecionarModelo(modelo) {

  modelosSelecionados.push(modelo);

  localStorage.setItem("modelosSelecionados", JSON.stringify(modelosSelecionados));

  document.getElementById("modalConfirm").style.display = "flex";
}
</script>


<!-- MODAL DE CONFIRMAÇÃO -->
<div id="modalConfirm" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
">

  <div style="
    background:white;
    padding:20px;
    border-radius:12px;
    text-align:center;
    width:250px;
  ">

    <p>Deseja editar este cartão?</p>

    <button onclick="irEditor()" style="margin-right:10px;">
      SIM
    </button>

    <button onclick="fecharModal()">
      NÃO
    </button>

  </div>

</div>

</body>
</html>
