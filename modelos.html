<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modelos</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-box">

<h1 id="tituloCategoria"></h1>

<p>Clique no cartão desejado para editar.</p>

<div id="areaModelos"></div>

<button onclick="voltar()">Voltar</button>

</div>

<!-- MODAL -->
<div id="modalConfirm" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;">
  <div style="background:#fff;padding:20px;border-radius:12px;text-align:center;width:250px;">
    <p>Deseja editar este cartão?</p>
    <button onclick="irEditor()">SIM</button>
    <button onclick="fecharModal()">NÃO</button>
  </div>
</div>

<script>

if (localStorage.getItem("logado") !== "true") {
  window.location.href = "index.html";
}

const categoria = localStorage.getItem("categoria");
const area = document.getElementById("areaModelos");

document.getElementById("tituloCategoria").innerText = categoria.toUpperCase();

// 🔥 LIMPA MODELos ao entrar (evita bug de duplicação)
let modelosSelecionados = [];

// se quiser manter histórico, aqui já fica pronto:
const antigos = JSON.parse(localStorage.getItem("modelosSelecionados")) || [];
modelosSelecionados = antigos;

if (categoria === "times") {

  area.innerHTML = `
    <img src="modelos/Cartao-SUS-Playstaion.png" width="300"
      onclick="selecionarModelo('Cartao-SUS-Playstaion.png')"
      style="cursor:pointer;border-radius:10px;margin:10px;">

    <img src="modelos/modelo1.png" width="300"
      onclick="selecionarModelo('modelo1.png')"
      style="cursor:pointer;border-radius:10px;margin:10px;">
  `;
}

function selecionarModelo(modelo) {

  // 🔥 adiciona SEM sobrescrever
  modelosSelecionados.push(modelo);

  localStorage.setItem("modelosSelecionados", JSON.stringify(modelosSelecionados));
  localStorage.setItem("modeloSelecionado", modelo); // último ativo

  document.getElementById("modalConfirm").style.display = "flex";
}

function irEditor() {
  window.location.href = "editor.html";
}

function fecharModal() {
  document.getElementById("modalConfirm").style.display = "none";
}

function voltar() {
  window.location.href = "painel.html";
}

</script>

</body>
</html>
