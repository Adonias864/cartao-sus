<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel</title>
<link rel="stylesheet" href="style.css">

<style>
body{
  display:none;
}
</style>
  
</head>

<body>

<div class="login-box">

  <h1>Categorias</h1>

  <button class="app-btn" onclick="abrirCategoria('infantil-masc')">🎈 INFANTIL MASCULINO</button>
  <button class="app-btn" onclick="abrirCategoria('infantil-femi')">🎈 INFANTIL FEMININO</button>
  <button class="app-btn" onclick="abrirCategoria('adulto-masc')">🙎‍♂️ ADULTO MASCULINO</button>
  <button class="app-btn" onclick="abrirCategoria('adulto-femi')">🙎‍♀️ ADULTO FEMININO</button>
  <button class="app-btn" onclick="abrirCategoria('times')">⚽ TIMES</button>
  <button class="app-btn" onclick="abrirCategoria('cristão')">✝️ CRISTÃO</button>

  <button class="app-btn sair" onclick="sair()">🚪 SAIR</button>

</div>

<script>

function abrirCategoria(categoria){
  localStorage.setItem("categoria", categoria);
  window.location.href = "modelos.html";
}

function sair(){
  logoutFirebase();
}
  
</script>

<script type="module" src="auth.js"></script>
  
</body>
</html>
