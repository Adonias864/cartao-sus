<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

 <div class="login-box">

  <h1>Escolha um Modelo</h1>

  <img
    src="modelos/Cartao-SUS-Playstaion.png"
    width="300"
  >

  <br><br>

  <button onclick="selecionarModelo()">
    Selecionar Modelo
  </button>

  <br><br>

  <button onclick="sair()">
    Sair
  </button>

</div>

  <script>

    if(localStorage.getItem("logado") !== "true"){

      window.location.href = "index.html";

    }

    function sair(){

      localStorage.removeItem("logado");

      window.location.href = "index.html";

    }

  </script>

</body>
</html>
