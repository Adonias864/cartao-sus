<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-box">

<h1>Editor de Cartão</h1>

<div class="cartao-area">
  <img id="cartao" crossorigin="anonymous">

  <div id="nomePreview" class="campo nome"></div>
  <div id="dataPreview" class="campo data"></div>
  <div id="sexoPreview" class="campo sexo"></div>
  <div id="cnsPreview" class="campo cns"></div>
  <div id="cpfPreview" class="campo cpf"></div>
</div>

<h2>Dados</h2>

<input id="nome" placeholder="Nome Completo">
<input id="data" placeholder="Data de Nasc.: DD/MM/AAAA">

<select id="sexo">
  <option value="M">M</option>
  <option value="F">F</option>
</select>

<input id="cns" placeholder="CNS">
<input id="cpf" placeholder="CPF">

<button onclick="adicionarCard()">Adicionar Card</button>
<button onclick="trocarModelo()">Trocar Modelo</button>
<button onclick="gerarPDF()">Gerar PDF</button>

  <button onclick="descartarCartoes()" class="sair">
  Descartar Cartões
</button>

<button onclick="sairSistema()" class="sair">
  Sair
</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

let cards = JSON.parse(localStorage.getItem("cards")) || [];

// login
if (localStorage.getItem("logado") !== "true") {
  window.location.href = "index.html";
}

// 🔥 pega último modelo correto
let modelos = JSON.parse(localStorage.getItem("modelosSelecionados")) || [];

let modeloAtual = localStorage.getItem("modeloSelecionado");

console.log("modeloAtual:", modeloAtual);
console.log("modelos:", modelos);

// fallback seguro
if (!modeloAtual && modelos.length > 0) {
  modeloAtual = modelos[modelos.length - 1];
}

const cartao = document.getElementById("cartao");

function carregarModelo(src) {
  cartao.src = "modelos/" + src;
}

carregarModelo(modeloAtual);

function trocarModelo() {
  window.location.href = "modelos.html";
}

// ================= PREVIEW =================

document.getElementById("nome").oninput = e =>
  document.getElementById("nomePreview").innerText = e.target.value.toUpperCase();

document.getElementById("sexo").onchange = e =>
  document.getElementById("sexoPreview").innerText = "Sexo: " + e.target.value;

document.getElementById("data").oninput = function () {
  let v = this.value.replace(/\D/g, "").substring(0, 8);
  if (v.length > 2) v = v.replace(/(\d{2})(\d)/, "$1/$2");
  if (v.length > 4) v = v.replace(/(\d{2})\/(\d{2})(\d)/, "$1/$2/$3");

  this.value = v;
  document.getElementById("dataPreview").innerText = "Data Nasc.: " + v;
};

document.getElementById("cpf").oninput = function () {
  let v = this.value.replace(/\D/g, "").substring(0, 11);
  v = v.replace(/(\d{3})(\d)/, "$1.$2");
  v = v.replace(/(\d{3})\.(\d{3})(\d)/, "$1.$2.$3");
  v = v.replace(/(\d{3})\.(\d{3})\.(\d{3})(\d)/, "$1.$2.$3-$4");

  this.value = v;
  document.getElementById("cpfPreview").innerText = "CPF: " + v;
};

document.getElementById("cns").addEventListener("input", function () {

  let v = this.value.replace(/\D/g, "");
  v = v.substring(0, 15);

  if (v.length > 3) {
    v = v.substring(0,3) + " " + v.substring(3);
  }

  if (v.length > 8) {
    v = v.substring(0,8) + " " + v.substring(8);
  }

  if (v.length > 13) {
    v = v.substring(0,13) + " " + v.substring(13);
  }

  this.value = v;

  document.getElementById("cnsPreview").textContent =
    "CNS: " + v;
});

// ================= ADD CARD =================

function adicionarCard() {

  if (cards.length >= 5) {
    alert("Limite de 5 cartões!");
    return;
  }

  const card = {
    nome: nome.value,
    data: data.value,
    sexo: sexo.value,
    cns: cns.value,
    cpf: cpf.value,
    modelo: modeloAtual
  };

  cards.push(card);

  localStorage.setItem("cards", JSON.stringify(cards));

  alert("Card adicionado! (" + cards.length + "/5)");

  nome.value = "";
  data.value = "";
  cns.value = "";
  cpf.value = "";

}

// ================= PDF =================

async function gerarPDF() {

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({
  orientation: "portrait",
  unit: "mm",
  format: "a4"
});

  const area = document.querySelector(".cartao-area");
  
  let y = 10;

  for (let c of cards) {

  carregarModelo(c.modelo);

  nomePreview.innerText = c.nome.toUpperCase();
  dataPreview.innerText = "Data Nasc.: " + c.data;
  sexoPreview.innerText = "Sexo: " + c.sexo;
  cnsPreview.innerText = "CNS: " + c.cns;
  cpfPreview.innerText = "CPF: " + c.cpf;

  await new Promise(r => setTimeout(r, 300));

const canvas = await html2canvas(area, {
  scale: window.devicePixelRatio || 2,
  useCORS: true,
  backgroundColor: "#ffffff"
});

  const img = canvas.toDataURL("image/png");

  pdf.addImage(img, "PNG", 20, y, 170, 55);

  y += 56;
}

  pdf.save("cartoes.pdf");

  localStorage.removeItem("cards");
localStorage.removeItem("modelosSelecionados");
  
}

function descartarCartoes() {

  if (!confirm("Deseja descartar todos os cartões adicionados?")) {
    return;
  }

  localStorage.removeItem("cards");
  localStorage.removeItem("modelosSelecionados");
  localStorage.removeItem("modeloSelecionado");

  window.location.href = "painel.html";
}

function sairSistema() {

  localStorage.removeItem("cards");
  localStorage.removeItem("modelosSelecionados");
  localStorage.removeItem("modeloSelecionado");

  window.location.href = "painel.html";
}
  
</script>

</body>
</html>
