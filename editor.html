<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor de Cartão</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="login-box">

  <h1>Editor de Cartão</h1>

  <!-- ÁREA DO CARTÃO -->
  <div class="cartao-area">

    <img id="cartao" width="100%">

    <div id="nomePreview" class="campo nome"></div>
    <div id="dataPreview" class="campo data"></div>
    <div id="sexoPreview" class="campo sexo"></div>
    <div id="cnsPreview" class="campo cns"></div>
    <div id="cpfPreview" class="campo cpf"></div>

  </div>

  <!-- FORMULÁRIO -->
  <h2>Dados</h2>

  <input id="nome" placeholder="Nome completo">
  <input id="data" placeholder="Data de nascimento">

  <select id="sexo">
    <option value="M">M</option>
    <option value="F">F</option>
  </select>

  <input id="cns" placeholder="CNS">
  <input id="cpf" placeholder="CPF">

  <button>Gerar Cartão</button>

</div>

<script>

if(localStorage.getItem("logado") !== "true"){
  window.location.href = "index.html";
}

if(!localStorage.getItem("modeloSelecionado")){
  window.location.href = "modelos.html";
}

const modelo = localStorage.getItem("modeloSelecionado");
const cartao = document.getElementById("cartao");

console.log("modelo:", modelo);

if(modelo === "playstation"){
  cartao.src = "modelos/Cartao-SUS-Playstaion.png";
}

const nomeInput = document.getElementById("nome");
const nomePreview = document.getElementById("nomePreview");

nomeInput.addEventListener("input", function(){
  nomePreview.innerText = this.value.toUpperCase();
});

</script>
  
</body>
</html>
