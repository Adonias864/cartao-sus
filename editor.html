<title>Editor</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-box">

  <h1>Editor de Cartão</h1>

  <div class="cartao-area">

    <img id="cartao" crossorigin="anonymous">

    <div id="nomePreview" class="campo nome"></div>
    <div id="dataPreview" class="campo data"></div>
    <div id="sexoPreview" class="campo sexo"></div>
    <div id="cnsPreview" class="campo cns"></div>
    <div id="cpfPreview" class="campo cpf"></div>

  </div>

  <h2>Dados</h2>

  <input id="nome" placeholder="Nome Completo">
  <input id="data" placeholder="Data de Nasc.: DD/MM/AAAA">

  <select id="sexo">
    <option value="M">M</option>
    <option value="F">F</option>
  </select>

  <input id="cns" placeholder="CNS: 000 0000 0000 0000">
  <input id="cpf" placeholder="CPF: 000.000.000-00">

  <button onclick="adicionarCard()">Adicionar Card</button>
  <button onclick="gerarPDF()">Gerar PDF</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

let cards = [];

// 🔥 proteção login
if (localStorage.getItem("logado") !== "true") {
  window.location.href = "index.html";
}

if (!localStorage.getItem("modeloSelecionado")) {
  window.location.href = "modelos.html";
}

// modelo inicial
const modelo = localStorage.getItem("modeloSelecionado");
const cartao = document.getElementById("cartao");

function carregarModelo(src) {
  cartao.src = src;
}

carregarModelo("modelos/" + modelo);

// =====================
// PREVIEW AO DIGITAR
// =====================

document.getElementById("nome").addEventListener("input", () => {
  document.getElementById("nomePreview").innerText =
    document.getElementById("nome").value.toUpperCase();
});

document.getElementById("sexo").addEventListener("change", () => {
  document.getElementById("sexoPreview").innerText =
    "Sexo: " + document.getElementById("sexo").value;
});

document.getElementById("data").addEventListener("input", function () {

  let v = this.value.replace(/\D/g, "");
  v = v.substring(0, 8);

  if (v.length > 2) v = v.replace(/(\d{2})(\d)/, "$1/$2");
  if (v.length > 4) v = v.replace(/(\d{2})\/(\d{2})(\d)/, "$1/$2/$3");

  this.value = v;

  document.getElementById("dataPreview").innerText =
    "Data Nasc.: " + v;
});

document.getElementById("cpf").addEventListener("input", function () {

  let v = this.value.replace(/\D/g, "");
  v = v.substring(0, 11);

  v = v.replace(/(\d{3})(\d)/, "$1.$2");
  v = v.replace(/(\d{3})\.(\d{3})(\d)/, "$1.$2.$3");
  v = v.replace(/(\d{3})\.(\d{3})\.(\d{3})(\d)/, "$1.$2.$3-$4");

  this.value = v;

  document.getElementById("cpfPreview").innerText =
    "CPF: " + v;
});

document.getElementById("cns").addEventListener("input", function () {

  let v = this.value.replace(/\D/g, "");
  v = v.substring(0, 15);

  v = v.replace(/(\d{3})(\d)/, "$1 $2");
  v = v.replace(/(\d{3}) (\d{4})(\d)/, "$1 $2 $3");
  v = v.replace(/(\d{3}) (\d{4}) (\d{4})(\d)/, "$1 $2 $3 $4");

  this.value = v;

  document.getElementById("cnsPreview").innerText =
    "CNS: " + v;
});

// =====================
// ADICIONAR CARD
// =====================

function adicionarCard() {

  if (cards.length >= 5) {
    alert("Limite de 5 cartões!");
    return;
  }

  const card = {
    nome: document.getElementById("nome").value,
    data: document.getElementById("data").value,
    sexo: document.getElementById("sexo").value,
    cns: document.getElementById("cns").value,
    cpf: document.getElementById("cpf").value,
    modelo: cartao.src
  };

  cards.push(card);

  alert("Card adicionado! (" + cards.length + "/5)");

  limparCampos();
}

function limparCampos() {
  document.getElementById("nome").value = "";
  document.getElementById("data").value = "";
  document.getElementById("cns").value = "";
  document.getElementById("cpf").value = "";
}

// =====================
// GERAR PDF
// =====================

async function gerarPDF() {

  if (cards.length === 0) {
    alert("Adicione pelo menos 1 card!");
    return;
  }

  const { jsPDF } = window.jspdf;

  const pdf = new jsPDF({
    orientation: "portrait",
    unit: "mm",
    format: "a4"
  });

  const cardWidth = 170;
  const cardHeight = 55;

  const pageWidth = 210;
  const x = (pageWidth - cardWidth) / 2;

  let y = 10;
  const gap = 3;

  const cartaoArea = document.querySelector(".cartao-area");

  for (let i = 0; i < cards.length; i++) {

    const c = cards[i];

    document.getElementById("nomePreview").innerText = c.nome.toUpperCase();
    document.getElementById("dataPreview").innerText = "Data Nasc.: " + c.data;
    document.getElementById("sexoPreview").innerText = "Sexo: " + c.sexo;
    document.getElementById("cnsPreview").innerText = "CNS: " + c.cns;
    document.getElementById("cpfPreview").innerText = "CPF: " + c.cpf;

    carregarModelo(c.modelo);

    await new Promise(resolve => {
      const img = document.getElementById("cartao");
      if (img.complete && img.naturalWidth > 0) return resolve();
      img.onload = () => resolve();
    });

    await new Promise(resolve => setTimeout(resolve, 400));

    const canvas = await html2canvas(cartaoArea, {
      scale: 3,
      useCORS: true
    });

    const imgData = canvas.toDataURL("image/png");

    pdf.addImage(imgData, "PNG", x, y, cardWidth, cardHeight);

    y += cardHeight + gap;
  }

  pdf.save("cartoes.pdf");
}

</script>

</body>
</html>
